<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shallu E-Books — Your Digital Library</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script>
    // ── Tailwind Config ──────────────────────────────────────
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            gold: { DEFAULT: '#C9A84C', light: '#E2C47A', dark: '#A07830' },
            ink: { DEFAULT: '#0D0F14', 800: '#13161E', 700: '#1A1E28', 600: '#222736', 500: '#2E3448' },
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease forwards',
            'slide-up': 'slideUp 0.5s cubic-bezier(.16,1,.3,1) forwards',
            'shimmer': 'shimmer 1.5s infinite',
          },
          keyframes: {
            fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: { from: { opacity: 0, transform: 'translateY(24px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    };
  </script>

  <style>
    * { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, .font-display { font-family: 'Playfair Display', serif; }
    body { background: #0D0F14; color: #E8E4DC; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #13161E; }
    ::-webkit-scrollbar-thumb { background: #C9A84C44; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #C9A84C; }

    /* Gold gradient text */
    .text-gold-gradient {
      background: linear-gradient(135deg, #E2C47A 0%, #C9A84C 50%, #A07830 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Shimmer skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1A1E28 25%, #222736 50%, #1A1E28 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    /* Book card hover glow */
    .book-card:hover { box-shadow: 0 0 0 1px #C9A84C44, 0 20px 60px #00000080; }
    .book-card { transition: all 0.3s cubic-bezier(.16,1,.3,1); }
    .book-card:hover { transform: translateY(-4px); }

    /* Star rating */
    .star { cursor: pointer; color: #2E3448; font-size: 1.1rem; transition: color 0.15s; }
    .star.filled, .star:hover, .star.hover { color: #C9A84C; }

    /* Nav active */
    .nav-link.active { color: #C9A84C; border-bottom: 2px solid #C9A84C; }
    .nav-link { border-bottom: 2px solid transparent; }

    /* Modal backdrop */
    .modal-backdrop { backdrop-filter: blur(12px); background: rgba(13, 15, 20, 0.85); }

    /* Toast */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; animation: slideUp 0.4s ease; max-width: 320px; }
    .toast-success { background: #134e2e; border: 1px solid #22c55e44; color: #86efac; }
    .toast-error { background: #4e1313; border: 1px solid #ef444444; color: #fca5a5; }
    .toast-info { background: #13274e; border: 1px solid #3b82f644; color: #93c5fd; }

    /* Input styles */
    .input-dark {
      background: #13161E;
      border: 1px solid #2E3448;
      color: #E8E4DC;
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    .input-dark:focus { border-color: #C9A84C; box-shadow: 0 0 0 3px #C9A84C22; }
    .input-dark::placeholder { color: #4a5068; }

    /* Button styles */
    .btn-gold {
      background: linear-gradient(135deg, #C9A84C, #A07830);
      color: #0D0F14;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 22px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    .btn-gold:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px #C9A84C44; }
    .btn-gold:active { transform: translateY(0); }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: transparent;
      border: 1px solid #2E3448;
      color: #E8E4DC;
      border-radius: 10px;
      padding: 10px 22px;
      transition: all 0.2s;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-outline:hover { border-color: #C9A84C; color: #C9A84C; }

    /* Page transition */
    .page { animation: fadeIn 0.35s ease; }

    /* Table */
    .admin-table th { color: #C9A84C; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222736; padding: 10px 16px; text-align: left; }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid #1A1E28; font-size: 14px; }
    .admin-table tr:hover td { background: #13161E; }

    /* Category pill */
    .category-pill { background: #1A1E28; border: 1px solid #2E3448; border-radius: 999px; padding: 4px 12px; font-size: 12px; color: #9ca3af; cursor: pointer; transition: all 0.2s; }
    .category-pill.active, .category-pill:hover { background: #C9A84C22; border-color: #C9A84C; color: #C9A84C; }
  </style>
</head>
<body class="min-h-screen">

  <!-- ══════════════════════════════════════════════ -->
  <!-- TOAST CONTAINER                               -->
  <!-- ══════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- AUTH MODAL                                    -->
  <!-- ══════════════════════════════════════════════ -->
  <div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop hidden">
    <div class="bg-ink-800 border border-ink-500 rounded-2xl w-full max-w-md mx-4 p-8 animate-slide-up">
      <div class="text-center mb-8">
        <h1 class="font-display text-3xl text-gold-gradient font-bold mb-1">Shallu E-Books</h1>
        <p class="text-gray-400 text-sm">Your premium digital library</p>
      </div>

      <!-- Tab switcher -->
      <div class="flex bg-ink-700 rounded-xl p-1 mb-6">
        <button onclick="switchAuthTab('login')" id="tab-login"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-ink-500 text-white">
          Sign In
        </button>
        <button onclick="switchAuthTab('signup')" id="tab-signup"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all text-gray-400">
          Create Account
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-400 mb-1 block">Email Address</label>
            <input type="email" id="login-email" class="input-dark" placeholder="you@example.com" />
          </div>
          <div>
            <label class="text-xs text-gray-400 mb-1 block">Password</label>
            <input type="password" id="login-password" class="input-dark" placeholder="••••••••" />
          </div>
          <button onclick="handleLogin()" class="btn-gold w-full mt-2 py-3">Sign In →</button>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="form-signup" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-400 mb-1 block">Full Name</label>
            <input type="text" id="signup-name" class="input-dark" placeholder="Jane Doe" />
          </div>
          <div>
            <label class="text-xs text-gray-400 mb-1 block">Email Address</label>
            <input type="email" id="signup-email" class="input-dark" placeholder="you@example.com" />
          </div>
          <div>
            <label class="text-xs text-gray-400 mb-1 block">Password</label>
            <input type="password" id="signup-password" class="input-dark" placeholder="Min. 6 characters" />
          </div>
          <button onclick="handleSignup()" class="btn-gold w-full mt-2 py-3">Create Account →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════ -->
  <!-- NAVIGATION                                    -->
  <!-- ══════════════════════════════════════════════ -->
  <nav class="sticky top-0 z-40 bg-ink-800/90 backdrop-blur-xl border-b border-ink-600">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">

        <!-- Logo -->
        <button onclick="navigateTo('store')" class="flex items-center gap-2">
          <span class="text-2xl">📚</span>
          <span class="font-display text-xl font-bold text-gold-gradient hidden sm:block">Shallu E-Books</span>
        </button>

        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center gap-1" id="nav-links">
          <button onclick="navigateTo('store')" class="nav-link px-4 py-4 text-sm font-medium text-gray-300 hover:text-white transition-colors" data-page="store">Store</button>
          <button onclick="navigateTo('profile')" class="nav-link px-4 py-4 text-sm font-medium text-gray-300 hover:text-white transition-colors hidden" id="nav-profile" data-page="profile">My Library</button>
          <button onclick="navigateTo('admin')" class="nav-link px-4 py-4 text-sm font-medium text-gray-300 hover:text-white transition-colors hidden" id="nav-admin" data-page="admin">Admin</button>
        </div>

        <!-- Auth buttons -->
        <div class="flex items-center gap-3">
          <div id="auth-logged-out" class="hidden">
            <button onclick="openAuthModal('login')" class="btn-outline text-sm py-2 px-4">Sign In</button>
          </div>
          <div id="auth-logged-in" class="hidden flex items-center gap-3">
            <button onclick="navigateTo('profile')" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gold to-gold-dark flex items-center justify-center text-ink font-bold text-sm" id="nav-avatar">?</div>
              <span class="text-sm text-gray-300 hidden sm:block" id="nav-username">User</span>
            </button>
            <button onclick="handleLogout()" class="text-gray-500 hover:text-red-400 transition-colors text-sm">Sign Out</button>
          </div>
          <!-- Mobile menu -->
          <button onclick="toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white p-2">☰</button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-ink-800 border-t border-ink-600 px-4 py-3 space-y-2">
      <button onclick="navigateTo('store'); toggleMobileMenu()" class="block w-full text-left py-2 text-sm text-gray-300">📖 Store</button>
      <button onclick="navigateTo('profile'); toggleMobileMenu()" class="block w-full text-left py-2 text-sm text-gray-300 hidden" id="mob-nav-profile">📚 My Library</button>
      <button onclick="navigateTo('admin'); toggleMobileMenu()" class="block w-full text-left py-2 text-sm text-gray-300 hidden" id="mob-nav-admin">⚙️ Admin Panel</button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════ -->
  <!-- MAIN CONTENT AREA                             -->
  <!-- ══════════════════════════════════════════════ -->
  <main id="app-content" class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <!-- Pages are dynamically injected here -->
  </main>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SCRIPTS                                       -->
  <!-- ══════════════════════════════════════════════ -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
